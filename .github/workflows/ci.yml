name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit + invariant tests
        env:
          GOOGLE_API_KEY: "dummy_key_for_tests"
          AUTONOMY_TIER: "MEDIUM"
        run: pytest tests/test_invariants.py -v
      - name: Tool contract tests
        env:
          GOOGLE_API_KEY: "dummy_key_for_tests"
          AUTONOMY_TIER: "MEDIUM"
        run: pytest tests/test_tool_contracts.py -v
      - name: Trajectory eval gate
        env:
          GOOGLE_API_KEY: "dummy_key_for_tests"
          AUTONOMY_TIER: "MEDIUM"
        run: pytest tests/test_trajectory.py -v
